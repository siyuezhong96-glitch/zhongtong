<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel快速查看器</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }
        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 60px 20px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            background: #e8ebff;
            border-color: #764ba2;
        }
        .drop-zone p {
            color: #667eea;
            font-size: 1.2em;
            margin: 10px 0;
        }
        .drop-zone small {
            color: #999;
        }
        #output {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.8;
            max-height: 600px;
            overflow-y: auto;
            display: none;
        }
        #output.show {
            display: block;
        }
        .file-input {
            display: none;
        }
        .copy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
            display: none;
        }
        .copy-btn:hover {
            opacity: 0.9;
        }
        .copy-btn.show {
            display: inline-block;
        }
        .success {
            color: #28a745;
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Excel快速查看器</h1>

        <div class="drop-zone" id="dropZone">
            <p>🎯 拖拽Excel文件到这里</p>
            <p style="font-size: 1em;">或</p>
            <p>📁 点击选择文件</p>
            <small>支持 .xlsx、.xls 格式</small>
        </div>

        <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls">

        <button id="copyBtn" class="copy-btn">📋 复制表头信息</button>
        <button id="showAllBtn" class="copy-btn">📄 显示全部数据</button>
        <span id="copySuccess" class="success" style="display:none;">✓ 已复制！</span>

        <pre id="output"></pre>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');
        const showAllBtn = document.getElementById('showAllBtn');
        const copySuccess = document.getElementById('copySuccess');
        let currentText = '';
        let allRowsData = null;
        let currentFile = null;

        // 点击选择文件
        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // 拖拽相关事件
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');

            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // 处理文件
        function handleFile(file) {
            currentFile = file;
            const reader = new FileReader();

            reader.onload = function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });

                    if (rows.length === 0) {
                        output.textContent = '❌ 文件为空或格式不正确';
                        output.classList.add('show');
                        return;
                    }

                    // 保存所有行数据
                    allRowsData = {
                        fileName: file.name,
                        sheetName: workbook.SheetNames[0],
                        rows: rows
                    };

                    // 显示预览
                    displayPreview(false);
                } catch (error) {
                    output.textContent = `❌ 读取失败: ${error.message}`;
                    output.classList.add('show');
                }
            };

            reader.readAsArrayBuffer(file);
        }

        // 显示数据（预览或全部）
        function displayPreview(showAll) {
            if (!allRowsData) return;

            const { fileName, sheetName, rows } = allRowsData;
            const headers = rows[0];

            let text = `📋 文件名: ${fileName}\n`;
            text += `📊 工作表: ${sheetName}\n`;
            text += `📏 表头字段（共${headers.length}列）:\n\n`;

            headers.forEach((h, i) => {
                text += `${i + 1}. ${h || '(空)'}\n`;
            });

            // 显示数据
            const maxRows = showAll ? rows.length - 1 : Math.min(5, rows.length - 1);
            if (rows.length > 1) {
                text += `\n📝 数据${showAll ? '全部' : '预览'}（${showAll ? '全部' : '前'}${maxRows}行）:\n\n`;
                for (let i = 1; i <= maxRows; i++) {
                    text += `第${i}行数据:\n`;
                    rows[i].forEach((cell, j) => {
                        if (cell !== '') {
                            text += `  [${j + 1}] ${headers[j]}: ${cell}\n`;
                        }
                    });
                    text += '\n';
                }

                if (!showAll && rows.length > 6) {
                    text += `... 还有 ${rows.length - 6} 行数据，点击"显示全部数据"查看完整内容\n`;
                }
            }

            currentText = text;
            output.textContent = text;
            output.classList.add('show');
            copyBtn.classList.add('show');
            showAllBtn.classList.add('show');
        }

        // 复制功能
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(currentText).then(() => {
                copySuccess.style.display = 'inline';
                setTimeout(() => {
                    copySuccess.style.display = 'none';
                }, 2000);
            });
        });

        // 显示全部数据
        showAllBtn.addEventListener('click', () => {
            displayPreview(true);
            showAllBtn.textContent = '✓ 已显示全部';
            setTimeout(() => {
                showAllBtn.textContent = '📄 显示全部数据';
            }, 2000);
        });
    </script>
</body>
</html>
